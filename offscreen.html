<!DOCTYPE html>
<html><head><meta charset="UTF-8"></head>
<body>
  <!-- Sandboxed iframe: WASM runs here under relaxed sandbox CSP -->
  <!-- No sandbox attribute: lets sandbox.html load with its manifest sandbox CSP,
       which allows 'unsafe-eval' (and therefore WASM compilation) -->
  <iframe id="ml-sandbox" src="sandbox.html" style="display:none"></iframe>
  <script src="offscreen.js"></script>
</body>
</html>
